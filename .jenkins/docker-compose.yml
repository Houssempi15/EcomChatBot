version: '3.8'

services:
  jenkins-test-agent:
    build:
      context: ..
      dockerfile: .jenkins/Dockerfile
    image: ecom-chat-bot-jenkins-agent:latest
    container_name: ecom-chat-bot-test-agent
    environment:
      # 测试环境配置
      - TEST_BASE_URL=http://115.190.75.88:8000
      - TEST_API_PREFIX=/api/v1
      - TEST_REQUEST_TIMEOUT=30
      - TEST_LLM_REQUEST_TIMEOUT=60
      - TEST_CLEANUP_AFTER_TEST=true
      - TEST_SKIP_PERFORMANCE=true
      - TEST_SKIP_SECURITY=true
      - TEST_LOG_LEVEL=INFO
      - TEST_TENANT_PREFIX=ci_test_
      - TEST_MAX_CONCURRENT=10
    volumes:
      # 挂载代码目录
      - ../:/workspace
      # 挂载报告目录
      - ./reports:/workspace/backend/tests/reports
    working_dir: /workspace/backend/tests
    command: /bin/bash -c "source activate ecom-chat-bot && tail -f /dev/null"
    networks:
      - jenkins-network

networks:
  jenkins-network:
    driver: bridge
