version: '3.8'

# 生产环境覆盖配置
services:
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/ecomchat.conf:/etc/nginx/conf.d/ecomchat.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    command: >
      sh -c "mkdir -p /var/cache/nginx/static && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_API_BASE_URL=/api/v1
        - NEXT_PUBLIC_WS_BASE_URL=wss://ecomchat.cn/api/v1/ws
    env_file:
      - frontend/.env.production

  api:
    env_file:
      - .env.local
      - backend/.env.production
    environment:
      DEPLOY_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"

  db-init:
    env_file:
      - .env.local
      - backend/.env.production
    environment:
      DEPLOY_ENV: production
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "true"

  celery-worker:
    env_file:
      - .env.local
      - backend/.env.production
    environment:
      DEPLOY_ENV: production
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
