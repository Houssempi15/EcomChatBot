services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: ecom-chatbot-postgres
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecom_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ecom-chatbot-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecom-network


  # 数据库初始化服务（只运行一次）
  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-db-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "true"
      RUN_MIGRATIONS: "false"
      # JWT配置
      JWT_SECRET: "ecom-chatbot-secret-key-change-in-production-2024"
      JWT_ALGORITHM: "HS256"
      # API Key配置
      API_KEY_PREFIX: "eck_"
      API_KEY_LENGTH: "32"
      # 基础配置
      APP_NAME: "电商智能客服系统"
      DEBUG: "true"
      ENVIRONMENT: "development"
    command: python init_db.py
    networks:
      - ecom-network
    restart: "no"

  # FastAPI 应用
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: https://in03-deb5691449f849a.serverless.ali-cn-hangzhou.cloud.zilliz.com.cn
      MILVUS_TOKEN: your-milvus-token-here
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
      # JWT配置
      JWT_SECRET: "ecom-chatbot-secret-key-change-in-production-2024"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_HOURS: "8"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "30"
      # API Key配置
      API_KEY_PREFIX: "eck_"
      API_KEY_LENGTH: "32"
      # 基础配置
      APP_NAME: "电商智能客服系统"
      APP_VERSION: "1.0.0"
      DEBUG: "true"  # 启用调试模式以显示文档
      ENVIRONMENT: "development"
      API_V1_PREFIX: "/api/v1"
      # LLM配置 - 使用DeepSeek作为默认提供商
      LLM_PROVIDER: "deepseek"
      # DeepSeek配置
      DEEPSEEK_API_KEY: "your-deepseek-api-key-here"
      DEEPSEEK_MODEL: "deepseek-chat"
      DEEPSEEK_BASE_URL: "https://api.deepseek.com"
      # OpenAI兼容配置（DeepSeek使用OpenAI兼容接口）
      OPENAI_API_KEY: "your-deepseek-api-key-here"
      OPENAI_API_BASE: "https://api.deepseek.com"
      OPENAI_MODEL: "deepseek-chat"
      DEFAULT_LLM_MODEL: "deepseek-chat"
      # Embedding 维度（text-embedding-v4 输出 1024 维）
      EMBEDDING_DIMENSION: "1024"
      # 存储配置
      STORAGE_BACKEND: "tos"
      # 火山引擎 TOS 配置
      TOS_ACCESS_KEY: "${TOS_ACCESS_KEY}"
      TOS_SECRET_KEY: "${TOS_SECRET_KEY}"
      TOS_ENDPOINT: "${TOS_ENDPOINT:-tos-cn-beijing.volces.com}"
      TOS_REGION: "${TOS_REGION:-cn-beijing}"
      TOS_BUCKET: "${TOS_BUCKET:-ecom-chatbot}"
      # 日志配置
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
    ports:
      - "8000:8000"
    # volumes:  # 生产环境不挂载，代码打包在镜像中
    #   - ./backend:/app
    networks:
      - ecom-network
    restart: unless-stopped

  # 前端应用（直接对外暴露 80 端口，通过 Next.js rewrites 代理 API 请求）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=/api/v1
        - NEXT_PUBLIC_WS_BASE_URL=
    container_name: ecom-chatbot-frontend
    depends_on:
      - api
    ports:
      - "80:3000"
    networks:
      - ecom-network
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
      # JWT配置
      JWT_SECRET: "ecom-chatbot-secret-key-change-in-production-2024"
      JWT_ALGORITHM: "HS256"
      # 基础配置
      APP_NAME: "电商智能客服系统"
      DEBUG: "true"
      ENVIRONMENT: "development"
      # 存储配置
      STORAGE_BACKEND: "tos"
      # 火山引擎 TOS 配置
      TOS_ACCESS_KEY: "${TOS_ACCESS_KEY}"
      TOS_SECRET_KEY: "${TOS_SECRET_KEY}"
      TOS_ENDPOINT: "${TOS_ENDPOINT:-tos-cn-beijing.volces.com}"
      TOS_REGION: "${TOS_REGION:-cn-beijing}"
      TOS_BUCKET: "${TOS_BUCKET:-ecom-chatbot}"
      LOG_LEVEL: "INFO"
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2 -Q default,notifications,data_processing,billing,webhooks
    networks:
      - ecom-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  ecom-network:
    driver: bridge
